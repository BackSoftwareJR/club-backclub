name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run php artisan migrate --force on server (SSH deploy only)'
        required: false
        default: true
        type: boolean
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - 'scripts/**'
      - 'docs/hostinger/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: sqlite, pdo_sqlite
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare backend environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run backend tests
        working-directory: backend
        run: php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare frontend production env
        working-directory: frontend
        run: cp .env.production.example .env.production

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare backend deployment bundle
        run: |
          mkdir -p deploy-bundle/backend
          rsync -a backend/ deploy-bundle/backend/ \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude 'public' \
            --exclude 'storage/logs/*' \
            --exclude 'storage/framework/cache/data/*' \
            --exclude 'storage/framework/sessions/*' \
            --exclude 'storage/framework/views/*' \
            --exclude '.phpunit.result.cache' \
            --exclude 'vendor'
          # vendor is installed on server via composer

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: deploy-bundle/backend/
          retention-days: 7

      - name: Upload API entry artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-entry
          path: |
            docs/hostinger/laravel-public-index.php
            docs/hostinger/laravel-public.htaccess
            docs/hostinger/public_html.htaccess
          retention-days: 7

  deploy-ssh:
    name: Deploy to Hostinger (SSH)
    needs: test-and-build
    runs-on: ubuntu-latest
    if: >-
      ${{
        secrets.HOSTINGER_SSH_HOST != '' &&
        secrets.HOSTINGER_SSH_USER != '' &&
        secrets.HOSTINGER_SSH_KEY != '' &&
        (secrets.HOSTINGER_LARAVEL_PATH != '' || secrets.HOSTINGER_BACKEND_PATH != '') &&
        (secrets.HOSTINGER_PUBLIC_HTML != '' || secrets.HOSTINGER_FRONTEND_PATH != '')
      }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-bundle
          path: deploy-bundle/backend/

      - name: Download API entry artifact
        uses: actions/download-artifact@v4
        with:
          name: api-entry
          path: docs/hostinger/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve deploy paths
        id: paths
        env:
          LARAVEL_PATH: ${{ secrets.HOSTINGER_LARAVEL_PATH || secrets.HOSTINGER_BACKEND_PATH }}
          PUBLIC_HTML: ${{ secrets.HOSTINGER_PUBLIC_HTML || secrets.HOSTINGER_FRONTEND_PATH }}
        run: |
          echo "laravel_path=${LARAVEL_PATH}" >> "$GITHUB_OUTPUT"
          echo "public_html=${PUBLIC_HTML}" >> "$GITHUB_OUTPUT"
          echo "api_public=${PUBLIC_HTML}/api" >> "$GITHUB_OUTPUT"

      - name: Deploy Laravel app via rsync
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          LARAVEL_PATH: ${{ steps.paths.outputs.laravel_path }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude '.env' \
            --exclude 'storage/logs/' \
            --exclude 'storage/framework/cache/data/' \
            --exclude 'storage/framework/sessions/' \
            --exclude 'storage/framework/views/' \
            deploy-bundle/backend/ \
            "${SSH_USER}@${SSH_HOST}:${LARAVEL_PATH}/"

      - name: Post-deploy backend commands
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          LARAVEL_PATH: ${{ steps.paths.outputs.laravel_path }}
          RUN_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations || 'true' }}
        run: |
          MIGRATE_CMD=""
          if [ "$RUN_MIGRATIONS" = "true" ]; then
            MIGRATE_CMD="php artisan migrate --force &&"
          fi
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "cd ${LARAVEL_PATH} && composer install --no-dev --optimize-autoloader && ${MIGRATE_CMD} php artisan config:cache && php artisan route:cache"

      - name: Deploy API public entry (index.php + .htaccess)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          API_PUBLIC_PATH: ${{ steps.paths.outputs.api_public }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p ${API_PUBLIC_PATH}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docs/hostinger/laravel-public-index.php \
            "${SSH_USER}@${SSH_HOST}:${API_PUBLIC_PATH}/index.php"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docs/hostinger/laravel-public.htaccess \
            "${SSH_USER}@${SSH_HOST}:${API_PUBLIC_PATH}/.htaccess"

      - name: Deploy SPA root .htaccess
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          PUBLIC_HTML: ${{ steps.paths.outputs.public_html }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docs/hostinger/public_html.htaccess \
            "${SSH_USER}@${SSH_HOST}:${PUBLIC_HTML}/.htaccess"

      - name: Deploy frontend via rsync
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          PUBLIC_HTML: ${{ steps.paths.outputs.public_html }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            frontend/dist/ \
            "${SSH_USER}@${SSH_HOST}:${PUBLIC_HTML}/"
